name: android-build

# Builds debug + signed release APKs and attaches them as downloadable
# artifacts. Triggers on push to main or manually via the Actions UI.
#
# Release signing requires four repository secrets:
#   ANDROID_KEYSTORE_BASE64  — base64-encoded .keystore file
#   ANDROID_STORE_PASSWORD   — keystore password
#   ANDROID_KEY_ALIAS        — key alias inside the keystore
#   ANDROID_KEY_PASSWORD     — key password
#
# Generate a keystore once locally (keep the file somewhere safe):
#   keytool -genkey -v -keystore willitcocktail.keystore \
#     -alias willitcocktail -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w 0 willitcocktail.keystore   # paste output into the secret

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/willitcocktail.keystore
          echo "ANDROID_KEYSTORE_PATH=${{ github.workspace }}/android/app/willitcocktail.keystore" >> $GITHUB_ENV
          echo "ANDROID_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build debug + release APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon
        working-directory: android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: willitcocktail-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: willitcocktail-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
