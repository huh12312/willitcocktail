name: android-build

# Builds debug + signed release APKs and attaches them as downloadable
# artifacts. Triggers on push to main or manually via the Actions UI.
#
# Release signing requires four repository secrets (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64  — base64 -w 0 .willitcocktail.keystore
#   ANDROID_STORE_PASSWORD   — willitcocktail2026
#   ANDROID_KEY_ALIAS        — willitcocktail
#   ANDROID_KEY_PASSWORD     — willitcocktail2026

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode keystore (if secrets are set)
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/willitcocktail.keystore
            echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/android/app/willitcocktail.keystore" >> $GITHUB_ENV
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug + release APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon
        working-directory: android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: willitcocktail-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: willitcocktail-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
