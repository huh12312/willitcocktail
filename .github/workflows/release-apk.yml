name: release-apk

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the APK to (e.g. v1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Build release APK
        run: |
          cd android
          ./gradlew :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: /tmp/release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          TAG="${{ inputs.tag }}"
          cp android/app/build/outputs/apk/release/app-release.apk \
             "willitcocktail-${TAG}.apk"
          echo "APK_PATH=willitcocktail-${TAG}.apk" >> "$GITHUB_ENV"

      - name: Attach APK to release
        run: |
          gh release upload "${{ inputs.tag }}" "${{ env.APK_PATH }}" \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
